name: Generate Datas

on:
  schedule: # Ejecutar cada 24 horas
    - cron: "0 */24 * * *" 
  workflow_dispatch: # Permite ejecutarlo manualmente
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Genera el juego de Pacman con tus contribuciones
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github-light&color_snake=#f4f42f&color_dots=#bfbdbe,#f09400,#ff0000,#00abcd
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f4f42f&color_dots=#bfbdbe,#f09400,#ff0000,#00abcd
          
      # Sube el contenido a la rama 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
