name: Generate Space Shooter Game

on:
  schedule:
    - cron: "0 0 * * *" # Se actualiza a la medianoche
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Generate Space Shooter Animation
        uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: space-shooter.gif
          strategy: random # La nave atacará tus cuadros de forma aleatoria
