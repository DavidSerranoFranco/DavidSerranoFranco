name: Generate Mario Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Se ejecuta cada medianoche
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mario-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Mario Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: DavidSerranoFranco
          template: repository
          base: ""
          filename: mario-metrics.svg 
          committer_branch: output # 👈 ¡ESTA ES LA LÍNEA MÁGICA! Envía a Mario a la rama correcta
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
